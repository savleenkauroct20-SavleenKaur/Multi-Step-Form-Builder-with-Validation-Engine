<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Step Form Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        <h1>Multi-Step Form Builder (MVP)</h1>
      </div>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </header>

    <main class="main-content">
      <div class="form-section">
        <div class="progress-container">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-fill"></div>
          </div>
          <div class="steps-indicator" id="steps-indicator">
            <!-- Steps injected by JS -->
          </div>
        </div>

        <div class="card form-card">
          <div id="step-content-wrapper" style="transition: opacity 0.3s ease, transform 0.3s ease;">
            <div id="form-header" class="form-header">
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="step-title" style="margin-bottom: 0;">Step Title</h2>
                <button type="button" id="btn-reset-top" class="btn btn-secondary" style="padding: 0.35rem 0.75rem; font-size: 0.75rem; display: flex; align-items: center; gap: 0.35rem;">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
                  Start Over
                </button>
              </div>
              <div class="simple-progress" id="simple-progress" style="margin: 0.75rem 0 1rem 0;">
                <div id="simple-progress-text" style="font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.5rem;">Step 1 of 4</div>
                <div style="height: 6px; background-color: var(--secondary-hover); border-radius: 10px; width: 100%; overflow: hidden;">
                  <div id="simple-progress-fill" style="height: 100%; background-color: var(--primary); border-radius: 10px; width: 25%; transition: width 0.3s ease;"></div>
                </div>
              </div>
              <p id="step-subtitle">Step description goes here.</p>
            </div>
            
            <form id="dynamic-form" class="dynamic-form">
              <div id="fields-container" class="fields-container">
                <!-- Fields injected by JS -->
              </div>
              
              <div class="form-navigation">
                <button type="button" id="btn-prev" class="btn btn-secondary">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                  Previous
                </button>
                <button type="button" id="btn-next" class="btn btn-primary">
                  Next
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
                <button type="submit" id="btn-submit" class="btn btn-primary" style="display: none;">
                  Submit
                </button>
              </div>
            </form>
          </div>

          <div id="success-message" class="success-message" style="display: none;">
            <div class="success-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            </div>
            <h2>Form Submitted Successfully</h2>
            <p>Your data has been securely saved.</p>
            <div id="success-data" style="margin-bottom: 1.5rem;"></div>
            <button id="btn-restart" class="btn btn-secondary mt-4">Start Over</button>
          </div>
        </div>
        
        <div class="security-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          Your data is secure and will not be shared.
        </div>
      </div>

      <aside class="sidebar-section">
        <div class="card summary-card">
          <h3>Form Summary</h3>
          <div id="summary-content" class="summary-content">
            <!-- Summary items injected by JS -->
          </div>
          
          <div class="auto-save-notice">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            <div>
              <strong>All changes are saved automatically.</strong>
              <p>Your progress is safe!</p>
            </div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
